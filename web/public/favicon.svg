<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="earPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb1c4"/>
      <stop offset="100%" stop-color="#fd8ea9"/>
    </radialGradient>
    <radialGradient id="cheekPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9eb5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff9eb5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ears (Back) -->
  <path d="M 22 45 C 10 30 8 10 8 10 C 15 8 35 15 40 28 Z" fill="#fcfcfc" stroke="#e0e0e0" stroke-width="1.5"/>
  <path d="M 25 40 C 18 30 16 18 16 18 C 22 16 32 22 36 28 Z" fill="url(#earPink)"/>

  <path d="M 78 45 C 90 30 92 10 92 10 C 85 8 65 15 60 28 Z" fill="#fcfcfc" stroke="#e0e0e0" stroke-width="1.5"/>
  <path d="M 75 40 C 82 30 84 18 84 18 C 78 16 68 22 64 28 Z" fill="url(#earPink)"/>

  <!-- Face/Head -->
  <path d="M 15 55 C 15 20 85 20 85 55 C 85 82 65 92 50 92 C 35 92 15 82 15 55 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  
  <!-- Cheeks -->
  <circle cx="28" cy="65" r="8" fill="url(#cheekPink)"/>
  <circle cx="72" cy="65" r="8" fill="url(#cheekPink)"/>

  <!-- Eyes (Big sparky) -->
  <circle cx="34" cy="52" r="7" fill="#2d2d2d"/>
  <circle cx="36" cy="50" r="2.5" fill="#ffffff"/>
  <circle cx="32" cy="54" r="1" fill="#ffffff"/>

  <circle cx="66" cy="52" r="7" fill="#2d2d2d"/>
  <circle cx="68" cy="50" r="2.5" fill="#ffffff"/>
  <circle cx="64" cy="54" r="1" fill="#ffffff"/>

  <!-- Nose -->
  <path d="M 48 60 L 52 60 L 50 63 Z" fill="#ff7da0"/>

  <!-- Mouth -->
  <path d="M 42 68 Q 46 72 50 68 Q 54 72 58 68" fill="none" stroke="#2d2d2d" stroke-width="2" stroke-linecap="round"/>

  <!-- Whiskers -->
  <path d="M 5 55 L 18 57" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 3 62 L 16 61" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
  
  <path d="M 95 55 L 82 57" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 97 62 L 84 61" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
</svg>
