[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 300"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[service]
internalPort = 8000

[[volumes]]
mount = "/app/knowledge_base"
name = "knowledge-data"

[[volumes]]
mount = "/app/outputs"
name = "campaign-outputs"
